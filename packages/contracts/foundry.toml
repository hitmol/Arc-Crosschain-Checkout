[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["node_modules"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 10000
via_ir = true
evm_version = "cancun"
fs_permissions = [{ access = "read-write", path = "../../deployments" }]
remappings = [
  "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
  "forge-std/=node_modules/forge-std/src/"
]

[profile.ci]
fuzz.runs = 1000
invariant.runs = 256
invariant.depth = 64

[rpc_endpoints]
arc_testnet = "${ARC_RPC_URL}"
