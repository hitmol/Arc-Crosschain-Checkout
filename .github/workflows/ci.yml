name: ci
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  javascript:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arc
          POSTGRES_PASSWORD: arc
          POSTGRES_DB: arc_checkout
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U arc -d arc_checkout"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://arc:arc@localhost:5432/arc_checkout?schema=public
      DEMO_MODE: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.9.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - uses: foundry-rs/foundry-toolchain@v1
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @arc-checkout/database migrate:deploy
      - name: Migrate isolated API test schema
        run: pnpm --filter @arc-checkout/database migrate:deploy
        env:
          DATABASE_URL: postgresql://arc:arc@localhost:5432/arc_checkout?schema=api_test
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:deployment-tooling
      - run: pnpm --dir apps/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: pnpm build
      - run: pnpm security:scan
      - run: pnpm audit --audit-level high

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.9.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - uses: foundry-rs/foundry-toolchain@v1
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:contracts
      - run: pnpm --filter @arc-checkout/contracts coverage
